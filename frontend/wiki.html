<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喵迹 - 猫咪图鉴</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">
  <h1>校园猫咪图鉴</h1>
  <p id="progressText">加载中...</p>
</div>

<div class="page-container" style="padding-top:16px;padding-bottom:100px;">
  <!-- 分类筛选 -->
  <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px;border-bottom:1px solid #f3f4f6;">
    <button class="btn btn-sm filter-btn active" data-filter="" style="background:#f97316;color:white;border:none;flex-shrink:0;" onclick="filterCats(this, '')">全部</button>
    <button class="btn btn-sm filter-btn" data-filter="健康" style="background:white;color:#6b7280;border:1px solid #d1d5db;flex-shrink:0;" onclick="filterCats(this, '健康')">😊 健康</button>
    <button class="btn btn-sm filter-btn" data-filter="需关注" style="background:white;color:#6b7280;border:1px solid #d1d5db;flex-shrink:0;" onclick="filterCats(this, '需关注')">😔 需关注</button>
    <button class="btn btn-sm filter-btn" data-filter="cat" style="background:white;color:#6b7280;border:1px solid #d1d5db;flex-shrink:0;" onclick="filterCats(this, 'cat')">🐱 已绝育</button>
  </div>

  <!-- 猫咪网格 -->
  <div id="catGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;">
    <div class="loading"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    <span>地图</span>
  </a>
  <a href="wiki.html" class="active">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
    <span>图鉴</span>
  </a>
  <a href="report.html">
    <div class="report-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </div>
    <span style="margin-top:2px;">打卡</span>
  </a>
  <a href="dashboard.html">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
    <span>看板</span>
  </a>
  <a href="profile.html">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    <span>我的</span>
  </a>
</nav>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
let allCats = [];

async function loadCats() {
  const res = await API.get('/cats');
  if (res.code !== 200) return;
  allCats = res.data;
  document.getElementById('progressText').textContent = `当前已解锁 ${allCats.length} 只小猫`;
  renderCats(allCats);
}
loadCats();

function renderCats(cats) {
  const grid = document.getElementById('catGrid');
  if (cats.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><p>暂无猫咪数据</p></div>';
    return;
  }

  grid.innerHTML = cats.map(cat => {
    const healthTag = cat.health_status === '健康' ? 'tag-green' : cat.health_status === '需关注' ? 'tag-orange' : 'tag-red';
    return `
      <a href="detail.html?id=${cat.id}" class="cat-card" style="text-decoration:none;color:inherit;">
        <div style="height:130px;overflow:hidden;">
          <img src="${cat.photo_url || ''}" alt="${cat.cat_name}" style="width:100%;height:100%;object-fit:cover;" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f3f4f6%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2260%22 text-anchor=%22middle%22 font-size=%2230%22>🐱</text></svg>'">
        </div>
        <div style="padding:12px;">
          <h4 style="font-weight:700;font-size:14px;">${cat.cat_name}</h4>
          <div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:11px;color:#9ca3af;">
            📍 ${cat.location}
          </div>
          <div style="display:flex;gap:4px;margin-top:8px;">
            <span class="tag ${healthTag}">${cat.health_status}</span>
            ${cat.is_neutered == 1 ? '<span class="tag tag-blue">已绝育</span>' : ''}
          </div>
        </div>
      </a>
    `;
  }).join('');
}

function filterCats(btn, filter) {
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.style.background = 'white';
    b.style.color = '#6b7280';
    b.style.border = '1px solid #d1d5db';
  });
  btn.style.background = '#f97316';
  btn.style.color = 'white';
  btn.style.border = 'none';

  let filtered = allCats;
  if (filter === 'cat') {
    filtered = allCats.filter(c => c.is_neutered == 1);
  } else if (filter) {
    filtered = allCats.filter(c => c.health_status === filter);
  }
  renderCats(filtered);
}
</script>
</body>
</html>
