<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喵迹 - 猫咪详情</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">
  <div style="display:flex;align-items:center;gap:12px;">
    <a href="index.html" style="color:white;text-decoration:none;display:flex;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <h1>猫咪档案</h1>
    <button id="favBtn" style="margin-left:auto;background:none;border:none;color:white;cursor:pointer;" onclick="toggleFav()">
      <svg id="favIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
  </div>
</div>

<div class="page-container" id="detailContent" style="padding-top:20px;">
  <div class="loading"></div>
</div>

<!-- 底部操作栏 -->
<div style="position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e5e7eb;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));display:flex;gap:12px;z-index:100;">
  <button class="btn btn-primary" style="flex:1;" onclick="feedCat()">🍽️ 我要投喂</button>
  <a class="btn btn-secondary" style="flex:1;text-align:center;" href="report.html">📸 去打卡</a>
</div>

<nav class="bottom-nav" style="display:none;" id="bottomNav"></nav>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
let catData = null;
let isFav = false;

async function loadDetail() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) {
    document.getElementById('detailContent').innerHTML = '<div class="empty-state"><p>未指定猫咪</p></div>';
    return;
  }

  const res = await API.get(`/cats/${id}`);
  if (res.code !== 200) {
    document.getElementById('detailContent').innerHTML = '<div class="empty-state"><p>猫咪不存在</p></div>';
    return;
  }

  catData = res.data;
  renderDetail(catData);
}

function renderDetail(cat) {
  const healthTag = cat.health_status === '健康' ? 'tag-green' : cat.health_status === '需关注' ? 'tag-orange' : 'tag-red';
  const neuterTag = cat.is_neutered == 1 ? 'tag-blue' : 'tag-gray';

  document.getElementById('detailContent').innerHTML = `
    <!-- 猫咪头部信息 -->
    <div style="display:flex;gap:16px;margin-bottom:24px;">
      <img src="${cat.photo_url || ''}" alt="${cat.cat_name}" style="width:120px;height:120px;border-radius:20px;object-fit:cover;background:#f3f4f6;" onerror="this.src='https://via.placeholder.com/120?text=🐱'">
      <div style="flex:1;">
        <h1 style="font-size:24px;font-weight:800;">${cat.cat_name}</h1>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">
          <span class="tag ${healthTag}">${cat.health_status}</span>
          <span class="tag ${neuterTag}">${cat.is_neutered == 1 ? '已绝育' : '未绝育'}</span>
          ${['亲人','社恐'].includes(cat.character_desc?.split('，')[1] || '') ? `<span class="tag tag-orange">${cat.character_desc?.split('，')[1] || ''}</span>` : ''}
        </div>
        <div style="margin-top:8px;font-size:13px;color:#6b7280;">
          <span>📍 ${cat.location}</span>
        </div>
      </div>
    </div>

    <!-- 基本信息 -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;">
      <div style="background:#f9fafb;border-radius:12px;padding:12px;text-align:center;">
        <div style="font-size:11px;color:#9ca3af;">性别</div>
        <div style="font-weight:700;font-size:16px;margin-top:4px;">${cat.gender}</div>
      </div>
      <div style="background:#f9fafb;border-radius:12px;padding:12px;text-align:center;">
        <div style="font-size:11px;color:#9ca3af;">年龄</div>
        <div style="font-weight:700;font-size:16px;margin-top:4px;">${cat.age}</div>
      </div>
      <div style="background:#f9fafb;border-radius:12px;padding:12px;text-align:center;">
        <div style="font-size:11px;color:#9ca3af;">毛色</div>
        <div style="font-weight:700;font-size:16px;margin-top:4px;">${cat.color}</div>
      </div>
    </div>

    <!-- 投喂统计 -->
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;">
      <div style="background:#fff7ed;border-radius:12px;padding:12px;text-align:center;border:1px solid #fed7aa;">
        <div style="font-size:20px;font-weight:800;color:#ea580c;">${cat.reportCount || 0}</div>
        <div style="font-size:11px;color:#9ca3af;">累计打卡</div>
      </div>
      <div style="background:#f0fdf4;border-radius:12px;padding:12px;text-align:center;border:1px solid #bbf7d0;">
        <div style="font-size:20px;font-weight:800;color:#16a34a;">${cat.feedCount || 0}</div>
        <div style="font-size:11px;color:#9ca3af;">被投喂</div>
      </div>
    </div>

    <!-- 猫咪小传 -->
    <div style="margin-bottom:20px;">
      <h3 style="font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px;">
        <span style="width:4px;height:16px;background:#f97316;border-radius:2px;display:inline-block;"></span>
        猫咪小传
      </h3>
      <p style="font-size:13px;color:#6b7280;line-height:1.7;background:#f9fafb;padding:16px;border-radius:12px;">
        ${cat.character_desc || '暂无介绍'}
      </p>
    </div>

    <!-- 投喂指南 -->
    <div style="background:#fff7ed;border-radius:16px;padding:16px;margin-bottom:20px;border:1px solid #fed7aa;">
      <h3 style="font-size:14px;font-weight:700;color:#9a3412;display:flex;align-items:center;gap:8px;">
        🍽️ 投喂指南
      </h3>
      <div style="margin-top:8px;font-size:12px;color:#c2410c;">
        <p>✅ 推荐：冻干、猫粮、洁净饮用水</p>
        <p style="margin-top:4px;">❌ 禁忌：火腿肠、含盐/油的人类食物、巧克力</p>
      </div>
    </div>

    <!-- 最新打卡动态 -->
    <div style="margin-bottom:24px;">
      <h3 style="font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;justify-content:space-between;">
        <span style="display:flex;align-items:center;gap:8px;">
          <span style="width:4px;height:16px;background:#f97316;border-radius:2px;display:inline-block;"></span>
          巡护动态 (${cat.reports?.length || 0})
        </span>
      </h3>
      <div id="reportsList">
        ${(cat.reports || []).map(r => `
          <div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f3f4f6;">
            <div style="width:6px;height:6px;background:#f97316;border-radius:50%;margin-top:6px;flex-shrink:0;"></div>
            <div style="flex:1;">
              <div style="display:flex;justify-content:space-between;font-size:12px;">
                <span style="font-weight:600;">${r.nickname || '匿名'}</span>
                <span style="color:#9ca3af;">${new Date(r.create_time).toLocaleString('zh-CN')}</span>
              </div>
              <p style="font-size:12px;color:#6b7280;margin-top:4px;">${r.description || '签到打卡'}</p>
            </div>
          </div>
        `).join('') || '<div style="text-align:center;padding:20px;color:#9ca3af;font-size:13px;">暂无打卡记录</div>'}
      </div>
    </div>

    <!-- 故事墙/评论区 -->
    <div style="margin-bottom:80px;">
      <h3 style="font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;">
        <span style="width:4px;height:16px;background:#f97316;border-radius:2px;display:inline-block;"></span>
        故事墙 💬
      </h3>
      <div id="commentsList" style="margin-bottom:12px;">
        <div class="loading"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <input id="commentInput" class="form-input" placeholder="分享你和${cat.cat_name}的故事..." style="flex:1;">
        <button class="btn btn-primary btn-sm" onclick="postComment()">发送</button>
      </div>
    </div>
  `;

  loadComments();
}

// 评论
async function loadComments() {
  const el = document.getElementById('commentsList');
  if (!catData) return;

  const res = await API.get(`/comments?cat_id=${catData.id}`);
  if (res.code !== 200) { el.innerHTML = '<div class="empty-state"><p>加载失败</p></div>'; return; }

  if (res.data.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:20px;color:#9ca3af;font-size:13px;">还没有留言，快来分享你和猫猫的故事吧 🐱</div>';
    return;
  }

  el.innerHTML = res.data.map(c => `
    <div style="padding:12px 0;border-bottom:1px solid #f3f4f6;">
      <div style="display:flex;gap:8px;">
        <div style="width:32px;height:32px;border-radius:50%;background:#f97316;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:600;flex-shrink:0;">${(c.nickname || '匿')[0]}</div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;">
            <span style="font-size:12px;font-weight:600;">${c.nickname || '匿名'}</span>
            <span style="font-size:10px;color:#9ca3af;">${new Date(c.create_time).toLocaleString('zh-CN')}</span>
          </div>
          <p style="font-size:13px;color:#4b5563;margin-top:4px;">${c.content}</p>
        </div>
      </div>
    </div>
  `).join('');
}

async function postComment() {
  const input = document.getElementById('commentInput');
  const content = input.value.trim();
  if (!content) return;

  const res = await API.post('/comments', { cat_id: catData.id, content });
  if (res.code === 200) {
    input.value = '';
    loadComments();
    showToast('留言成功！');
  } else {
    showToast(res.msg || '发送失败', 'error');
  }
}

// 收藏
async function toggleFav() {
  if (!Auth.isLoggedIn()) return window.location.href = 'login.html';
  isFav = !isFav;
  document.getElementById('favIcon').style.fill = isFav ? 'currentColor' : 'none';
}

// 投喂
async function feedCat() {
  if (!Auth.isLoggedIn()) return window.location.href = 'login.html';
  const food = prompt('你喂了什么食物？(如: 猫粮、冻干)', '猫粮');
  if (!food) return;

  const res = await API.post('/feeds', { cat_id: catData.id, food });
  if (res.code === 200) {
    showToast(`✅ 已记录投喂${food}！`);
    loadDetail();
  } else {
    showToast(res.msg || '操作失败', 'error');
  }
}

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

loadDetail();
</script>
</body>
</html>
